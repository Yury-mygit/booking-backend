name: booking_dev

services:
  app:
    build: .
    container_name: booking_dev_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8026:8000"
    environment:
      - SERVICE_NAME=${SERVICE_NAME}
      - VERSION=${VERSION:-0.1.0}
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TG_BOT_USERNAME=${TG_BOT_USERNAME:-rforge_stay_bot}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - TG_WEBHOOK_SECRET=${TG_WEBHOOK_SECRET:-}
      - DEV_MODE=${DEV_MODE:-false}
      - PUBLIC_BASE_APP=${PUBLIC_BASE_APP:-https://book.dev.raftforge.art/}
      - CHAT_TG_NOTIFICATIONS_ENABLED=${CHAT_TG_NOTIFICATIONS_ENABLED:-true}
    volumes:
      - booking_storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/info', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - shared

volumes:
  booking_storage:

networks:
  shared:
    external: true
