name: booking_dev

services:
  app:
    build: .
    container_name: booking_dev_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8026:8000"
    environment:
      - SERVICE_NAME=${SERVICE_NAME}
      - VERSION=${VERSION:-0.1.0}
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TG_BOT_USERNAME=${TG_BOT_USERNAME:-rforge_stay_bot}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - TG_WEBHOOK_SECRET=${TG_WEBHOOK_SECRET:-}
      - DEV_MODE=${DEV_MODE:-false}
    volumes:
      - booking_storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/info"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - shared

volumes:
  booking_storage:

networks:
  shared:
    external: true
